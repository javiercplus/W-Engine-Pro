<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2bb3d6"></stop>
      <stop offset="100%" stop-color="#1e2a78"></stop>
    </linearGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"></stop>
      <stop offset="50%" stop-color="#ff00ff"></stop>
      <stop offset="100%" stop-color="#00ff99"></stop>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="80" fill="url(#bg)"></rect>

  <!-- Monitor -->
  <rect x="96" y="120" width="320" height="200" rx="20" fill="#ffffff"></rect>
  <rect x="110" y="135" width="292" height="170" rx="12" fill="#1c2b5a"></rect>

  <!-- Base -->
  <rect x="200" y="320" width="112" height="20" rx="6" fill="#ffffff"></rect>
  <rect x="170" y="340" width="172" height="20" rx="10" fill="#ffffff"></rect>

  <!-- Círculo neon -->
  <circle cx="256" cy="220" r="60" fill="none" stroke="url(#neon)" stroke-width="4"></circle>

  <!-- Engranaje simplificado -->
  <g stroke="#ffffff" stroke-width="3" fill="none">
    <circle cx="256" cy="220" r="45"></circle>
  </g>

  <!-- Letra W -->
  <text x="256" y="235" text-anchor="middle" font-size="48" font-family="Arial, sans-serif" fill="#ffffff" font-weight="bold">
    W
  </text>

  <!-- Texto -->
  <text x="256" y="430" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#ffffff">
    W-ENGINE
  </text>

  <text x="256" y="465" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#ffffff">
    PRO
  </text>

</svg>